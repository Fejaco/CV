let lang='pt', vizMode='radar', toolFilter='all', certFilter='all';
const E=id=>document.getElementById(id);
const LVL=v=>{const L=T[lang].levels;return v>=90?L[0]:v>=75?L[1]:L[2];};

function render(){
  const d=T[lang];
  document.documentElement.lang=lang;
  document.querySelectorAll('#nl a').forEach((a,i)=>a.textContent=d.nav[i]);
  E('h-role').textContent=d.hero.role; E('h-sub').textContent=d.hero.sub; E('h-lead').textContent=d.hero.lead;
  E('h-dlcv').textContent=d.hero.dlcv; E('h-contact').textContent=d.hero.contact; E('h-loc').textContent=d.hero.loc; E('h-occ').textContent=d.hero.occ;

  E('radarTitle').textContent=d.radarTitle; E('toolsTitle').textContent=d.toolsTitle; E('langTitle').textContent=d.langTitle;
  E('vb-radar').textContent=d.vizRadar; E('vb-bars').textContent=d.vizBars; E('radarNote').textContent=d.radarNote;
  E('certIntro').innerHTML=d.certIntro; E('contactText').textContent=d.contactText; E('contactBtn').textContent=d.contactBtn;
  E('footerText').textContent=d.footer; E('dlNote').textContent=d.dlNote;
  renderKPIs(d); renderExp(d); renderAcad(d); renderTools(d); renderCerts(d); renderProjects(d); renderLangs(d); renderDownloads(d); drawViz();
  document.querySelectorAll('#langToggle button').forEach(b=>b.classList.toggle('active',b.dataset.l===lang));
}
function renderKPIs(d){
  E('kpis').innerHTML=d.kpis.map(k=>`<div class="kpi"><div class="n" data-n="${k.anim?k.n:''}" data-suf="${k.suf||''}">${k.anim?'0':k.n}</div><div class="l">${k.l}</div></div>`).join('');
  document.querySelectorAll('#kpis .n[data-n]').forEach(el=>{
    if(el.dataset.n==='') return;
    const t=+el.dataset.n, suf=el.dataset.suf||''; let c=0; const step=Math.max(1,Math.round(t/40));
    const iv=setInterval(()=>{c+=step; if(c>=t){c=t;clearInterval(iv);} el.textContent=c+suf;},22);
  });
}
function renderExp(d){
  E('tl').innerHTML=d.exp.map(x=>`<div class="tl-item${x.cur?' cur':''}"><div class="tl-date">${x.date}</div><div class="tl-role">${x.role}</div><div class="tl-org">${x.org}</div><div class="tl-desc">${x.desc}</div></div>`).join('');
}
function renderAcad(d){
  E('acad').innerHTML=d.acad.map(a=>`<div class="c"><div class="y">${a.y}</div><div class="t">${a.t}</div><div class="e">${a.e}</div>${a.badge?`<div class="badge">${a.badge}</div>`:''}</div>`).join('');
}
function renderTools(d){
  E('toolfilters').innerHTML=`<button class="chip${toolFilter==='all'?' active':''}" data-c="all">${d.all}</button>`+d.toolCats.map((c,i)=>`<button class="chip${toolFilter==String(i)?' active':''}" data-c="${i}">${c}</button>`).join('');
  const list=(toolFilter==='all')?d.tools:d.tools.filter(t=>t[2]==+toolFilter);
  E('tools').innerHTML=list.map(([n,v])=>`<div class="bar"><div class="bl"><span>${n}</span><span>${LVL(v)}</span></div><div class="track"><div class="fill" style="width:0"></div></div></div>`).join('');

}
function renderCerts(d){

  let items=[];
  (certFilter==='all'?areas.map((_,i)=>i):[+certFilter]).forEach(i=>areas[i][2].forEach(t=>items.push([areas[i][0],t])));
  E('certs').innerHTML=items.map(([a,t])=>`<div class="cert"><span class="a">${a}</span>${t}</div>`).join('');
}

function renderDownloads(d){

function drawViz(){
  vizMode==='bars'?drawBars():drawRadar();
  document.querySelectorAll('#vizToggle button').forEach(b=>b.classList.toggle('active',b.dataset.v===vizMode));
}
function drawRadar(){
  const d=T[lang], labels=d.compLabels, values=compVals, flat=d.compFlat;
  const N=5,cx=300,cy=215,R=130;
  const ang=i=>-Math.PI/2+i*2*Math.PI/N;
  const P=(i,r)=>[cx+Math.cos(ang(i))*r,cy+Math.sin(ang(i))*r];
  const poly=r=>Array.from({length:N},(_,i)=>P(i,r).map(n=>n.toFixed(1)).join(',')).join(' ');
  const dp=Array.from({length:N},(_,i)=>P(i,R*values[i]/100).map(n=>n.toFixed(1)).join(',')).join(' ');
  let s=`<svg viewBox="0 0 600 470" width="100%" style="display:block;max-width:560px;margin:0 auto">`;
  [0.25,0.5,0.75,1].forEach(f=>s+=`<polygon points="${poly(R*f)}" fill="none" stroke="#e3e9f0" stroke-width="1"/>`);
  for(let i=0;i<N;i++){const[x,y]=P(i,R);s+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#e3e9f0" stroke-width="1"/>`;}
  s+=`<polygon points="${dp}" fill="rgba(46,117,182,.20)" stroke="#1f3d68" stroke-width="2"><animate attributeName="points" from="${poly(0)}" to="${dp}" dur="0.7s" fill="freeze"/></polygon>`;
  for(let i=0;i<N;i++){const[x,y]=P(i,R*values[i]/100);s+=`<circle class="rp" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5" fill="#10294a"><title>${flat[i]}</title></circle>`;}
  for(let i=0;i<N;i++){const[x,y]=P(i,R+16);const c=Math.cos(ang(i));const anchor=c>0.25?'start':(c<-0.25?'end':'middle');const ln=labels[i];const y0=y-(ln.length-1)*7;let t=`<text x="${x.toFixed(1)}" y="${y0.toFixed(1)}" text-anchor="${anchor}" font-family="IBM Plex Sans,sans-serif" font-size="11.5" font-weight="500" fill="#1c2733">`;ln.forEach((l,k)=>t+=`<tspan x="${x.toFixed(1)}" dy="${k===0?0:14}">${l}</tspan>`);s+=t+`</text>`;}
  E('radar').innerHTML=s+`</svg>`;
}
function drawBars(){
  const d=T[lang];
  E('radar').innerHTML=`<div class="bars" style="padding:14px 4px">`+d.compFlat.map((n,i)=>`<div class="bar"><div class="bl"><span>${n}</span><span>${LVL(compVals[i])}</span></div><div class="track"><div class="fill" style="width:0"></div></div></div>`).join('')+`</div>`;
  requestAnimationFrame(()=>document.querySelectorAll('#radar .fill').forEach((f,i)=>f.style.width=compVals[i]+'%'));
}
E('langToggle').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return; if(b.dataset.l!==lang){lang=b.dataset.l; toolFilter='all'; certFilter='all'; render();}});
E('vizToggle').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return; vizMode=b.dataset.v; drawViz();});
E('toolfilters').addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return; toolFilter=b.dataset.c; renderTools(T[lang]);});
E('filters').addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return; certFilter=b.dataset.a; renderCerts(T[lang]);});
render();
